<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        
        .type-selector {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #4a5568;
            cursor: pointer;
        }
        .radio-label input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #007bff;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #007bff;
            border-bottom: 3px solid #007bff;
            margin-bottom: -2px;
        }
        .tab-btn.mm-active.active {
            color: #8c6239;
            border-bottom: 3px solid #8c6239;
        }
        .calculator-form {
            display: none;
        }
        .calculator-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #4a4a4a;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .col {
            flex: 1;
        }
        .calc-btn {
            width: 100%;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        #btn-en { background-color: #007bff; }
        #btn-en:hover { background-color: #0056b3; }
        #btn-mm { background-color: #8c6239; }
        #btn-mm:hover { background-color: #6f4e2d; }
        
        .footer-credit {
            margin-top: 25px;
            font-size: 25px;
            color: #888;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-box {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.2s ease-out;
        }
        .modal-box h3 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .status-pass { color: #28a745; }
        .status-fail { color: #dc3545; }
        
        .modal-box p {
            color: #333;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 22px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ddd;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-yes {
            background-color: #28a745;
            color: white;
        }
        .btn-yes:hover { background-color: #218838; }
        .btn-no {
            background-color: #6c757d;
            color: white;
        }
        .btn-no:hover { background-color: #5a6268; }
        .btn-ok {
            background-color: #007bff;
            color: white;
        }
        .btn-ok:hover { background-color: #0056b3; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Age Calculator</h2>
    
    
    <div class="type-selector">
        <label class="radio-label">
            <input type="radio" name="appType" value="new" checked> အသစ် (၁၈ - ၆၂)
        </label>
        <label class="radio-label">
            <input type="radio" name="appType" value="old"> အဟောင်း (၁၈ - ၇၀)
        </label>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('english-tab', this, false)">Eng ခုနှစ်ဖြင့် တွက်ရန်</button>
        <button class="tab-btn" onclick="switchTab('myanmar-tab', this, true)">မြန်မာခုနှစ်ဖြင့် တွက်ရန်</button>
    </div>

    
    <div id="english-tab" class="calculator-form active">
        <div class="form-group">
            <label for="enYear">မွေးဖွားသည့် အင်္ဂလိပ်ခုနှစ် </label>
            <input type="number" id="enYear" placeholder="ဥပမာ - 1994" min="1" max="2100" required>
        </div>
        <div class="form-group">
            <label for="enMonth">မွေးဖွားသည့် အင်္ဂလိပ်လ </label>
            <select id="enMonth">
                <option value="1">ဇန်နဝါရီ (January)</option>
                <option value="2">ဖေဖော်ဝါရီ (February)</option>
                <option value="3">မတ် (March)</option>
                <option value="4">ဧပြီ (April)</option>
                <option value="5">မေ (May)</option>
                <option value="6">ဇွန် (June)</option>
                <option value="7">ဇူလိုင် (July)</option>
                <option value="8">သြဂုတ် (August)</option>
                <option value="9">စက်တင်ဘာ (September)</option>
                <option value="10">အောက်တိုဘာ (October)</option>
                <option value="11">နိုဝင်ဘာ (November)</option>
                <option value="12">ဒီဇင်ဘာ (December)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="enDay">မွေးဖွားသည့်ရက် (၁ မှ ၃၁)</label>
            <input type="number" id="enDay" placeholder="ဥပမာ - 9" min="1" max="31" required>
        </div>
        <button class="calc-btn" id="btn-en" onclick="calculateEnglishAge()">အသက်တွက်မည်</button>
    </div>

    
    <div id="myanmar-tab" class="calculator-form">
        <div class="form-group">
            <label for="mmYear">မွေးဖွားသည့် မြန်မာခုနှစ်</label>
            <input type="number" id="mmYear" placeholder="ဥပမာ - ၁၃၂၆" min="1" max="1600" required>
        </div>
        <div class="form-group">
            <label for="mmMonth">မွေးဖွားသည့် မြန်မာလ</label>
            <select id="mmMonth">
                <option value="1">တန်ခူး</option>
                <option value="2">ကဆုန်</option>
                <option value="3">နယုန်</option>
                <option value="4">ဝါဆို</option>
                <option value="5">ဝါခေါင်</option>
                <option value="6">တော်သလင်း</option>
                <option value="7">သီတင်းကျွတ်</option>
                <option value="8">တန်ဆောင်မုန်း</option>
                <option value="9">နတ်တော်</option>
                <option value="10">ပြာသို</option>
                <option value="11">တပို့တွဲ</option>
                <option value="12">တပေါင်း</option>
            </select>
        </div>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="moonPhase">လဆန်း / လဆုတ် -</label>
                    <select id="moonPhase">
                        <option value="1">လဆန်း</option>
                        <option value="2">လဆုတ်</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="mmDay">ရက် (၁ မှ ၁၅) </label>
                    <input type="number" id="mmDay" min="1" max="15" value="1" required>
                </div>
            </div>
        </div>
        <button class="calc-btn" id="btn-mm" onclick="calculateMyanmarAge()">အသက်တွက်မည်</button>
    </div>
</div>


<div id="ageModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalText"></p>
        <div id="modalButtons" class="modal-buttons"></div>
    </div>
</div>

<div class="footer-credit">## by KSL ##</div>

<script>
    // ==========================================
    // ⚙️ FORCE UPDATE SYSTEM
    // ==========================================
    const CURRENT_VERSION = "1.1"; 
    const VERSION_CHECK_URL = "https://raw.githubusercontent.com/kaungsanlin/Age-Calculator-/main/version.json";

    function checkAppUpdate() {
        if(!VERSION_CHECK_URL || VERSION_CHECK_URL.includes("your-username")) return;
        fetch(VERSION_CHECK_URL)
            .then(response => response.json())
            .then(data => {
                if (data.latestVersion !== CURRENT_VERSION) {
                    showUpdateModal(data.message, data.updateUrl);
                }
            })
            .catch(error => console.log("Update check skipped:", error));
    }

    function showUpdateModal(message, updateUrl) {
        const modalHtml = `
            <div id="updateModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:99999; display:flex; justify-content:center; align-items:center; padding:20px; box-sizing:border-box;">
                <div style="background:#fff; padding:25px; border-radius:12px; max-width:400px; width:100%; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3);">
                    <h3 style="color:#dc3545; margin-top:0; font-size:20px;">⚠️ အပ်ဒိတ်အသစ်ရရှိနိုင်ပါပြီ</h3>
                    <p style="color:#4a4a4a; line-height:1.6; text-align:left; font-size:15px; margin-bottom:25px;">${message}</p>
                    <a href="${updateUrl}" target="_blank" style="display:block; text-decoration:none; width:100%; background:#28a745; color:#fff; padding:12px 0; border-radius:6px; font-size:16px; font-weight:bold; text-align:center;">ယခုပဲ အပ်ဒိတ်ရယူမည်</a>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.addEventListener('DOMContentLoaded', checkAppUpdate);

    // ==========================================
    // 🛡️ DYNAMIC POPUP CONTROLLER WITH CUSTOM AGE LIMITS
    // ==========================================
    function showSmartPopup(years, months, days, infoText) {
        const modal = document.getElementById('ageModal');
        const titleEl = document.getElementById('modalTitle');
        const textEl = document.getElementById('modalText');
        const buttonsEl = document.getElementById('modalButtons');
        const boxEl = document.querySelector('.modal-box p');

        
        const selectedType = document.querySelector('input[name="appType"]:checked').value;
        
        
        let maxAgeLimit = (selectedType === 'old') ? 70 : 62; 
        let typeLabel = (selectedType === 'old') ? "အဟောင်း (၁၈ - ၇၀)" : "အသစ် (၁၈ - ၆၂)";

        let ageResultHtml = `<b>📊 တွက်ချက်မှုရလဒ် [${typeLabel}] -</b><br>` + infoText + `<br>` +
                            `• ယနေ့သက်တမ်း - <b>${years} နှစ်၊ ${months} လ၊ ${days} ရက်</b>`;

        
        if (years >= 18 && years <= maxAgeLimit) {
            
            titleEl.className = "status-pass";
            titleEl.innerHTML = "🎉 အောင်မြင်ပါသည်";
            boxEl.style.borderLeftColor = "#28a745";
            textEl.innerHTML = ageResultHtml + `<hr style="border:0; border-top:1px dashed #ddd; margin:12px 0;"><span style="color:#1e3a8a; font-weight:bold;">MCIX  သို့ တိုက်ရိုက်သွားမလားခင်ဗျာ?</span>`;
            
            buttonsEl.innerHTML = `
                <button class="modal-btn btn-yes" onclick="handlePopupChoice(true)">Yes (သွားမည်)</button>
                <button class="modal-btn btn-no" onclick="handlePopupChoice(false)">No (ပိတ်မည်)</button>
            `;
        } 
        else {
            
            titleEl.className = "status-fail";
            boxEl.style.borderLeftColor = "#dc3545";
            
            if (years > maxAgeLimit) {
                titleEl.innerHTML = `⚠️ Over Age (အသက် ${maxAgeLimit} နှစ်ကျော်လွန်နေပါသည်)`;
            } else {
                titleEl.innerHTML = "⚠️ Under Age (အသက် ၁၈ နှစ် မပြည့်သေးပါ)";
            }
            
            textEl.innerHTML = ageResultHtml + `<hr style="border:0; border-top:1px dashed #ddd; margin:12px 0;"><span style="color:#dc3545; font-weight:bold;">သတ်မှတ်ထားသော အသက်ကန့်သတ်ချက် (၁၈ မှ ${maxAgeLimit} နှစ်) အတွင်း မရှိပါ။</span>`;
            
            buttonsEl.innerHTML = `
                <button class="modal-btn btn-ok" onclick="handlePopupChoice(false)">OK (သိပါပြီ)</button>
            `;
        }

        modal.style.display = 'flex';
    }

    function handlePopupChoice(goToMcix) {
        document.getElementById('ageModal').style.display = 'none';
        if (goToMcix) {
            window.open("https://live.mcixportal.com/search/simple", "_blank");
        }
    }

    function switchTab(tabId, btn, isMm) {
        document.querySelectorAll('.calculator-form').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(tBtn => {
            tBtn.classList.remove('active');
            tBtn.classList.remove('mm-active');
        });
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(isMm) btn.classList.add('mm-active');
    }

    function getCurrentMyanmarDate() {
        const today = new Date();
        const adYear = today.getFullYear();
        const adMonth = today.getMonth() + 1;
        const adDate = today.getDate();
        let mmYear = adYear - 638;
        if (adMonth < 4 || (adMonth === 4 && adDate <= 16)) mmYear = adYear - 639;
        let mmMonth = adMonth - 3;
        if (mmMonth <= 0) mmMonth += 12;
        let moonPhase = (adDate > 15) ? 2 : 1;
        let mmDay = adDate % 15;
        if (mmDay === 0) mmDay = 15;
        return { year: mmYear, month: mmMonth, phase: moonPhase, day: mmDay };
    }

    // ==================================//
    // 🧮 AGE CALCULATOR PROCESSING               //
    // ==================================//
    function calculateEnglishAge() {
        const year = parseInt(document.getElementById('enYear').value);
        const month = parseInt(document.getElementById('enMonth').value);
        const day = parseInt(document.getElementById('enDay').value);
        
        if (!year || !day) {
            alert("ကျေးဇူးပြု၍ အချက်အလက်များ အားလုံး ဖြည့်စွက်ပေးပါ။");
            return;
        }
        const dob = new Date(year, month - 1, day);
        const today = new Date();
        if (dob > today) {
            alert("မွေးသက္ကရာဇ်သည် ယနေ့ရက်စွဲထက် မကြီးရပါ။");
            return;
        }
        let years = today.getFullYear() - dob.getFullYear();
        let months = today.getMonth() - dob.getMonth();
        let days = today.getDate() - dob.getDate();
        if (days < 0) {
            months--;
            const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
            days += previousMonth.getDate();
        }
        if (months < 0) {
            years--;
            months += 12;
        }
        const monthText = document.getElementById('enMonth').options[month-1].text;
        let infoText = `• မွေးသက္ကရာဇ် - <b>${year} ခုနှစ်၊ ${monthText}၊ ${day} ရက်</b>`;
        
        showSmartPopup(years, months, days, infoText);
    }

    function calculateMyanmarAge() {
        const birthYear = parseInt(document.getElementById('mmYear').value);
        const birthMonth = parseInt(document.getElementById('mmMonth').value);
        const birthPhase = parseInt(document.getElementById('moonPhase').value);
        const birthDay = parseInt(document.getElementById('mmDay').value);
        
        if (!birthYear || !birthDay) {
            alert("ကျေးဇူးပြု၍ အချက်အလက်များ အားလုံး ဖြည့်စွက်ပေးပါ။");
            return;
        }
        const current = getCurrentMyanmarDate();
        if (birthYear > current.year) {
            alert("မွေးသက္ကရာဇ်ခုနှစ်သည် လက်ရှိခုနှစ်ထက် ကြီးနေပါသည်။");
            return;
        }
        let days = current.day - birthDay;
        let borrowMonth = 0;
        if (days < 0) {
            days += 15;
            borrowMonth = 1;
        }
        let months = current.month - birthMonth - borrowMonth;
        let borrowYear = 0;
        if (months < 0) {
            months += 12;
            borrowYear = 1;
        }
        let years = current.year - birthYear - borrowYear;
        const monthText = document.getElementById('mmMonth').options[birthMonth-1].text;
        const phaseText = (birthPhase === 1 ? 'ဆန်း' : 'ဆုတ်');
        
        let infoText = `• မွေးသက္ကရာဇ် - <b>မြန်မာသက္ကရာဇ် ${birthYear} ခု၊ ${monthText}လ${phaseText} ${birthDay} ရက်</b><br>` +
                       `• ယခုလက်ရှိ - <b>မြန်မာသက္ကရာဇ် ${current.year} ခုနှစ်</b>`;

        showSmartPopup(years, months, days, infoText);
    }
</script>

</body>
</html>
